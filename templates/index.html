<!DOCTYPE html>
<html>

<head>
    <title>SCM Operations Support Tool</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">
        SCM Operations Support Tool
    </h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h3> {{ customers_count }}</h3>
                    <p>Customers</p>
                </div>
            </div>
        </div>
    
        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h3> {{ materials_count }}</h3>
                    <p>Materials</p>
                </div>
            </div>
        </div>
    

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h3> {{ sales_orders_count }}</h3>
                    <p>Sales Orders</p>
                </div>
            </div>
        </div>
    

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h3> {{ support_requests_count }}</h3>
                    <p>Support Requests</p>
                </div>
            </div>
        </div>
    
    </div>

</div>

</body>
</html>
