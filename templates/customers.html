<!DOCTYPE html>
<html>

<head>
    <title>Customers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">
    <h1>Customers</h1>
    <table class="table table-bordered table-striped">
        
        <thead>
            <tr>
                <th>Customer ID</th>
                <th>Customer Name</th>
                <th>Country</th>
                <th>Status</th>
            </tr>
        
        </thead>
        
        <tbody>
            {% for customer in customers %}
            
            <tr>
                <td>{{ customer[0] }}</td>
                <td>{{ customer[1] }}</td>
                <td>{{ customer[2] }}</td>
                <td>{{ customer[3] }}</td>
            
            </tr>
            
            {% endfor %}
        
        </tbody>
    
    </table>

</div>

</body>
</html>
